title: Mini-OpenCV
description: >-
  A high-performance CUDA-based image processing library — pixel operations, convolution,
  morphology, geometric transforms, filters, color space conversion, and async pipeline processing.
tagline: GPU-accelerated Mini OpenCV
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
repository: LessUp/mini-opencv
show_downloads: false

# SEO & metadata
url: https://lessup.github.io
baseurl: /mini-opencv
lang: en
author: LessUp

# Social links
social:
  name: LessUp
  links:
    - https://github.com/LessUp

# Markdown rendering
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "changelog"
    values:
      layout: default

# Navigation (for themes that support it)
navigation:
  - title: "Home"
    url: "/"
  - title: "English README"
    url: "/README"
  - title: "中文 README"
    url: "/README.zh-CN"
  - title: "Contributing"
    url: "/CONTRIBUTING"
  - title: "Changelog"
    url: "/CHANGELOG"

# Exclude irrelevant files from Jekyll build
exclude:
  - src
  - include
  - tests
  - examples
  - benchmarks
  - build
  - cmake-build-*
  - CMakeLists.txt
  - CMakePresets.json
  - CMakeUserPresets.json
  - compile_commands.json
  - .editorconfig
  - .clang-format
  - .clang-tidy
  - .gitignore
  - .git
  - .github
  - .kiro
  - "*.cu"
  - "*.cuh"
  - "*.cpp"
  - "*.hpp"
  - "*.o"
  - "*.a"
  - "*.so"
  - "*.exe"
  - "*.sh"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Include these files
include:
  - CHANGELOG.md
