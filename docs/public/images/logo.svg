<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#76B900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5A9200;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="100" height="100" rx="12" fill="#1a1a1a"/>

  <!-- GPU Grid Pattern -->
  <g fill="url(#grid)">
    <!-- Row 1 -->
    <rect x="20" y="20" width="18" height="18" rx="2"/>
    <rect x="42" y="20" width="18" height="18" rx="2" opacity="0.6"/>
    <rect x="64" y="20" width="18" height="18" rx="2"/>
    <rect x="86" y="20" width="18" height="18" rx="2" opacity="0.6"/>

    <!-- Row 2 -->
    <rect x="20" y="42" width="18" height="18" rx="2" opacity="0.6"/>
    <rect x="42" y="42" width="18" height="18" rx="2"/>
    <rect x="64" y="42" width="18" height="18" rx="2" opacity="0.6"/>
    <rect x="86" y="42" width="18" height="18" rx="2"/>

    <!-- Row 3 -->
    <rect x="20" y="64" width="18" height="18" rx="2"/>
    <rect x="42" y="64" width="18" height="18" rx="2" opacity="0.6"/>
    <rect x="64" y="64" width="18" height="18" rx="2"/>
    <rect x="86" y="64" width="18" height="18" rx="2" opacity="0.6"/>

    <!-- Row 4 -->
    <rect x="20" y="86" width="18" height="18" rx="2" opacity="0.6"/>
    <rect x="42" y="86" width="18" height="18" rx="2"/>
    <rect x="64" y="86" width="18" height="18" rx="2" opacity="0.6"/>
    <rect x="86" y="86" width="18" height="18" rx="2"/>
  </g>
</svg>
