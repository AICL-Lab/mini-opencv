name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - 'index.md'
      - 'README.md'
      - 'README.zh-CN.md'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
      - '_config.yml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug build'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            index.md
            README.md
            README.zh-CN.md
            CONTRIBUTING.md
            CHANGELOG.md
            LICENSE
            _config.yml
            docs

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Enable strict PWA caching
          static_site_generator: jekyll

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
          # Enable verbose logging for debugging
          verbose: ${{ inputs.debug == 'true' }}
          # Build future posts and draft posts
          future: true
          draft_posts: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Enable preview mode for non-main branches (optional)
          preview: ${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
